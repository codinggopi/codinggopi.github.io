<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent Successfully</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #050810;
            --cyan: #06b6d4;
            --blue: #3b82f6;
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated Grid Pattern */
        .ambient-grid {
            position: absolute;
            inset: 0;
            z-index: 0;
            background-image: linear-gradient(rgba(6, 182, 212, 0.04) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(6, 182, 212, 0.04) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveGrid 20s linear infinite;
        }

        @keyframes moveGrid {
            0% { background-position: 0 0; }
            100% { background-position: 50px 50px; }
        }

        /* Ambient Glowing Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            pointer-events: none;
        }
        .orb-1 {
            width: 400px; height: 400px;
            background: rgba(6, 182, 212, 0.15);
            top: -100px; left: -100px;
            animation: float 8s ease-in-out infinite alternate;
        }
        .orb-2 {
            width: 450px; height: 450px;
            background: rgba(59, 130, 246, 0.15);
            bottom: -150px; right: -100px;
            animation: float 10s ease-in-out infinite alternate-reverse;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-30px) scale(1.05); }
        }

        /* Particles Container */
        #particles {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* Glassmorphism Card */
        .glass-card {
            position: relative;
            z-index: 10;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3.5rem 2.5rem;
            max-width: 600px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 30px rgba(6, 182, 212, 0.1);
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(40px);
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Card Content */
        .success-icon {
            font-size: 4.5rem;
            background: linear-gradient(135deg, var(--cyan), var(--blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
            display: inline-block;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s forwards;
            opacity: 0;
            transform: scale(0.5);
        }

        @keyframes popIn {
            to { opacity: 1; transform: scale(1); }
        }

        .title {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 22px;
            font-weight: 600;
            color: var(--cyan);
            margin-bottom: 1.5rem;
        }

        .description {
            font-size: 18px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }
        
        .description strong {
            color: #fff;
            font-weight: 600;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
        }

        @media (min-width: 640px) {
            .btn-group {
                flex-direction: row;
                justify-content: center;
            }
        }

        .btn {
            text-decoration: none;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            padding: 14px 28px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            border: 1px solid transparent;
            width: 100%;
            justify-content: center;
        }

        @media (min-width: 640px) {
            .btn { width: auto; }
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--cyan), var(--blue));
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(6, 182, 212, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--cyan);
            color: var(--cyan);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        /* Footer */
        .footer-text {
            position: absolute;
            bottom: 2rem;
            width: 100%;
            text-align: center;
            color: rgba(148, 163, 184, 0.6);
            font-size: 14px;
            z-index: 10;
        }

        @media (max-width: 768px) {
            .title { font-size: 32px; }
            .subtitle { font-size: 18px; }
            .description { font-size: 16px; }
            .glass-card { padding: 2.5rem 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="ambient-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <canvas id="particles"></canvas>

    <div class="glass-card">
        <i class="fa-solid fa-circle-check success-icon"></i>
        <h1 class="title">🎉 Message Sent Successfully</h1>
        <h2 class="subtitle">Thank you for reaching out!</h2>
        <p class="description">
            I've received your message successfully and will get back to you within <strong>24–48 hours</strong>.
        </p>

        <div class="btn-group">
            <a href="https://github.com/codinggopi" class="btn btn-secondary">
                <i class="fa-brands fa-github"></i> GitHub
            </a>
            <a href="https://linkedin.com/in/gopinath-g-12075732b" class="btn btn-secondary">
                <i class="fa-brands fa-linkedin-in"></i> LinkedIn
            </a>
            <a href="https://codinggopi.github.io" class="btn btn-primary">
                <i class="fa-solid fa-arrow-left"></i> Back to Portfolio
            </a>
        </div>
    </div>

    <div class="footer-text">
        Building solutions with code, creativity and AI.
    </div>

    <script>
        // Simple Particle System
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let particles = [];
        const particleCount = 40;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * -0.5 - 0.1;
                this.opacity = Math.random() * 0.5 + 0.1;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.y < 0) {
                    this.y = height;
                    this.x = Math.random() * width;
                }
                if (this.x < 0 || this.x > width) {
                    this.speedX *= -1;
                }
            }

            draw() {
                ctx.fillStyle = `rgba(6, 182, 212, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            for (let particle of particles) {
                particle.update();
                particle.draw();
            }
            
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            resize();
            initParticles();
        });

        // Initialize
        resize();
        initParticles();
        animate();
    </script>
</body>
</html>
